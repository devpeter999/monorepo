name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Ensure PR body is not empty or just whitespace
          if [[ -z "$PR_BODY" || "$PR_BODY" =~ ^[[:space:]]*$ ]]; then
            echo "::error::PR description is required. Please fill out the PR description."
            exit 1
          fi

          echo "PR validation passed."
